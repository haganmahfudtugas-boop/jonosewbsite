<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Animasi Keren</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#111827,#2563eb,#7c3aed,#06b6d4);background-size:400% 400%;animation:bg 10s ease infinite}
@keyframes bg{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.box{width:100%;max-width:420px;padding:35px;border-radius:22px;background:rgba(255,255,255,.15);backdrop-filter:blur(15px);box-shadow:0 20px 50px rgba(0,0,0,.25)}
h1{text-align:center;color:#fff;margin-bottom:10px}
p{text-align:center;color:#e5e7eb;margin-bottom:24px;font-size:14px}
.field{margin-bottom:15px}
input{width:100%;padding:13px;border:none;border-radius:12px;background:rgba(255,255,255,.2);color:#fff;outline:none}
input::placeholder{color:#e5e7eb}
button{width:100%;padding:13px;border:none;border-radius:12px;background:#fff;font-weight:bold;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-3px)}
.footer{text-align:center;margin-top:18px;color:#fff}
a{color:#fff;text-decoration:none;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h1>Buat Akun</h1>
<p>Daftar akun baru sekarang</p>
<form action="register.php" method="POST">
<div class="field"><input type="text" name="nama" placeholder="Nama Lengkap" required></div>
<div class="field"><input type="email" name="email" placeholder="Email" required></div>
<div class="field"><input type="password" name="password" placeholder="Password" required></div>
<div class="field"><input type="password" name="konfirmasi" placeholder="Konfirmasi Password" required></div>
<button type="submit">Daftar Sekarang</button>
</form>
<div class="footer">Sudah punya akun? <a href="login-form-website.html">Login</a></div>
</div>
</body>
</html>
