<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login System Full</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#00ffff,#009999);
}

.box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#008b8b;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #00cccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#00ffff;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#00dddd;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#008b8b;
    cursor:pointer;
    font-weight:bold;
    text-decoration:none;
}

.hidden{
    display:none;
}

.msg{
    text-align:center;
    margin-bottom:10px;
    color:red;
    font-size:14px;
}
</style>
</head>
<body>

<div class="box">

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<div class="msg" id="loginMsg"></div>

<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Masuk</button>

<p>Belum punya akun? <a onclick="showRegister()">Daftar</a></p>
</div>

<!-- REGISTER -->
<div id="registerPage" class="hidden">
<h2>Daftar</h2>
<div class="msg" id="regMsg"></div>

<input type="text" id="regUser" placeholder="Username">
<input type="password" id="regPass" placeholder="Password">

<button onclick="register()">Daftar</button>

<p>Sudah punya akun? <a onclick="showLogin()">Login</a></p>
</div>

<!-- DASHBOARD -->
<div id="dashboardPage" class="hidden">
<h2>Dashboard</h2>
<p style="margin-bottom:20px;">Selamat datang, <span id="namaUser"></span></p>

<button onclick="logout()">Logout</button>
</div>

</div>

<script>

const loginPage = document.getElementById("loginPage");
const registerPage = document.getElementById("registerPage");
const dashboardPage = document.getElementById("dashboardPage");

function showRegister(){
    loginPage.classList.add("hidden");
    registerPage.classList.remove("hidden");
}

function showLogin(){
    registerPage.classList.add("hidden");
    loginPage.classList.remove("hidden");
}

function register(){

    let user = document.getElementById("regUser").value;
    let pass = document.getElementById("regPass").value;

    if(user=="" || pass==""){
        regMsg.innerText = "Isi semua data!";
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("Registrasi berhasil!");
    showLogin();
}

function login(){

    let user = document.getElementById("loginUser").value;
    let pass = document.getElementById("loginPass").value;

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");

    if(user === savedUser && pass === savedPass){

        localStorage.setItem("isLogin","true");

        masukDashboard();

    }else{
        loginMsg.innerText = "Username / Password salah!";
    }
}

function masukDashboard(){

    loginPage.classList.add("hidden");
    registerPage.classList.add("hidden");
    dashboardPage.classList.remove("hidden");

    namaUser.innerText = localStorage.getItem("username");
}

function logout(){

    localStorage.removeItem("isLogin");

    dashboardPage.classList.add("hidden");
    loginPage.classList.remove("hidden");
}

window.onload = function(){

    // auto isi username password
    loginUser.value = localStorage.getItem("username") || "";
    loginPass.value = localStorage.getItem("password") || "";

    // kalau sudah login langsung dashboard
    if(localStorage.getItem("isLogin") === "true"){
        masukDashboard();
    }
}

</script>

</body>
</html>
