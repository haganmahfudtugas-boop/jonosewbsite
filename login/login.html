<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Login & Register</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        margin: 0;
        height: 100vh;
        background: linear-gradient(135deg, #00ffff, #008b8b);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background: #ffffff;
        width: 340px;
        height: 400px;
        border-radius: 14px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        position: relative;
        overflow: hidden;
    }

    .form {
        position: absolute;
        width: 100%;
        height: 100%;
        padding: 30px;
        top: 0;
        left: 0;
        transition: all 0.5s ease;
    }

    h2 {
        text-align: center;
        color: #008b8b;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #00ffff;
        border-radius: 6px;
    }

    button {
        width: 100%;
        padding: 10px;
        background: #00ffff;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        color: #004f4f;
    }

    button:hover {
        background: #00cccc;
    }

    p {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    a {
        color: #008b8b;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
    }

    .msg {
        text-align: center;
        margin-bottom: 10px;
        font-size: 14px;
        color: red;
        min-height: 18px;
    }

    /* Animasi */
    #registerForm {
        transform: translateX(100%);
        opacity: 0;
    }

    .show-register #loginForm {
        transform: translateX(-100%);
        opacity: 0;
    }

    .show-register #registerForm {
        transform: translateX(0);
        opacity: 1;
    }
</style>
</head>

<body>

<div class="container" id="container">

    <!-- LOGIN -->
    <div class="form" id="loginForm">
        <h2>Login</h2>
        <div class="msg" id="loginMsg"></div>

        <input type="text" id="loginUser" placeholder="Username">
        <input type="password" id="loginPass" placeholder="Password">

        <button onclick="login()">Masuk</button>
        <p>Belum punya akun? <a onclick="showRegister()">Daftar</a></p>
    </div>

    <!-- REGISTER -->
    <div class="form" id="registerForm">
        <h2>Daftar</h2>
        <div class="msg" id="registerMsg"></div>

        <input type="text" id="regUser" placeholder="Username">
        <input type="password" id="regPass" placeholder="Password">

        <button onclick="register()">Daftar</button>
        <p>Sudah punya akun? <a onclick="showLogin()">Login</a></p>
    </div>

</div>

<script>
    const container = document.getElementById("container");

    function showRegister() {
        clearMsg();
        container.classList.add("show-register");
    }

    function showLogin() {
        clearMsg();
        container.classList.remove("show-register");
    }

    function clearMsg() {
        loginMsg.textContent = "";
        registerMsg.textContent = "";
    }

    /* REGISTER */
    function register() {
        const user = regUser.value.trim();
        const pass = regPass.value.trim();

        if (!user || !pass) {
            registerMsg.textContent = "Username dan password wajib diisi!";
            return;
        }

        localStorage.setItem("rememberUser", user);
        localStorage.setItem("rememberPass", pass);

        alert("Registrasi berhasil! Data disimpan.");
        showLogin();
        autoFillLogin();
    }

    /* LOGIN */
    function login() {
        const user = loginUser.value.trim();
        const pass = loginPass.value.trim();

        if (
            user === localStorage.getItem("rememberUser") &&
            pass === localStorage.getItem("rememberPass")
        ) {
            alert("Login berhasil!");
        } else {
            loginMsg.textContent = "Username atau password salah!";
        }
    }

    /* AUTO ISI SAAT PAGE DIBUKA */
    function autoFillLogin() {
        const savedUser = localStorage.getItem("rememberUser");
        const savedPass = localStorage.getItem("rememberPass");

        if (savedUser && savedPass) {
            loginUser.value = savedUser;
            loginPass.value = savedPass;
        }
    }

    // Jalan otomatis saat halaman dibuka
    window.onload = autoFillLogin;
</script>

</body>
</html>
